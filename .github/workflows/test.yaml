name: test
on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      # Set Python up and install cocotb
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Verify standalone 1x1 source mirror
        shell: bash
        run: |
          diff -ru src targets/1x1-minimal/src
          cmp info.yaml targets/1x1-minimal/info.yaml

      - name: Test hardening-metric policy
        run: python tools/test_check_harden_metrics.py -q

      - name: Run tests
        run: |
           cd test
           make clean
           make
           cd ..
           python tools/check_junit.py test/results.xml \
             --expected-tests 1 --test-name test_project

      - name: Exhaust compact controller decoder
        shell: bash
        run: |
          iverilog -g2012 -DCOCOTB_SIM -I src \
            -s tb_decoder_exhaustive \
            -o test/decoder_exhaustive.vvp \
            test/tb_decoder_exhaustive.sv \
            src/tt_um_ja_achtung_1x1.v src/psram_controller.v \
            src/display_streamer.v src/game_fsm.v src/vga_sync.v
          vvp test/decoder_exhaustive.vvp | tee test/decoder_exhaustive.log
          grep -q "PASS compact decoder exhaustive: cases=8193 failures=0" \
            test/decoder_exhaustive.log

      - name: Test Summary
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        with:
          paths: "test/results.xml"
        if: always()

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          overwrite: true
          path: |
            test/tb.fst
            test/results.xml
            test/decoder_exhaustive.log
            test/output/*
